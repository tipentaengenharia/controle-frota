<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; color: #1a1a2e; min-height: 100vh; padding-top: env(safe-area-inset-top); }
  .layout { display: flex; min-height: 100vh; }
  .sidebar { width: 240px; background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%); color: #fff; display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; box-shadow: 4px 0 20px rgba(0,0,0,0.3); transition: transform 0.28s ease; }
  .sidebar-logo { padding: 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
  .sidebar-logo h1 { font-size: 14px; font-weight: 700; color: #29ABE2; letter-spacing: 0.5px; }
  .sidebar-logo p { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 3px; }
  .sidebar-nav { flex: 1; padding: 16px 0; }
  .nav-section { padding: 0 16px 8px; font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.3); letter-spacing: 1px; text-transform: uppercase; margin-top: 12px; }
  .nav-item { display: flex; align-items: center; gap: 12px; padding: 11px 20px; cursor: pointer; transition: all 0.2s; color: rgba(255,255,255,0.65); font-size: 13.5px; border-left: 3px solid transparent; }
  .nav-item:hover { background: rgba(255,255,255,0.07); color: #fff; }
  .nav-item.active { background: rgba(41,171,226,0.15); color: #29ABE2; border-left-color: #29ABE2; }
  .main { margin-left: 240px; flex: 1; display: flex; flex-direction: column; }
  .topbar { background: #fff; padding: 16px 28px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 1px 4px rgba(0,0,0,0.08); position: sticky; top: 0; z-index: 50; }
  .topbar h2 { font-size: 18px; font-weight: 700; color: #1a1a2e; }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .topbar-badge { background: #29ABE2; color: #fff; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
  .sync-status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #64748b; }
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; }
  .sync-dot.loading { background: #f59e0b; animation: pulse 1s infinite; }
  .sync-dot.error { background: #ef4444; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .content { padding: 24px 28px; flex: 1; }
  .cards-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; margin-bottom: 24px; }
  .card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); position: relative; overflow: hidden; }
  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--accent, #29ABE2); }
  .card-icon { width: 42px; height: 42px; border-radius: 10px; background: var(--bg, #fff0f3); display: flex; align-items: center; justify-content: center; margin-bottom: 12px; }
  .card-label { font-size: 11.5px; color: #888; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
  .card-value { font-size: 26px; font-weight: 700; color: #1a1a2e; margin: 4px 0 2px; }
  .card-sub { font-size: 12px; color: #aaa; }
  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 24px; }
  .chart-card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .chart-card h3 { font-size: 14px; font-weight: 600; color: #1a1a2e; margin-bottom: 16px; }
  .chart-wrap { position: relative; height: 220px; }
  .vtr-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 24px; }
  .vtr-card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .vtr-card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .vtr-badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; }
  .vtr-badge.mobi { background: #dbeafe; color: #1d4ed8; }
  .vtr-badge.montana { background: #fce7f3; color: #be185d; }
  .vtr-c0 { background: #dbeafe; color: #1d4ed8; }
  .vtr-c1 { background: #fce7f3; color: #be185d; }
  .vtr-c2 { background: #dcfce7; color: #15803d; }
  .vtr-c3 { background: #ffedd5; color: #c2410c; }
  .vtr-c4 { background: #f3e8ff; color: #7c3aed; }
  .vtr-c5 { background: #ccfbf1; color: #0f766e; }
  .vtr-card-title { font-size: 15px; font-weight: 700; color: #1a1a2e; }
  .vtr-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .vtr-stat { text-align: center; padding: 12px 8px; background: #f8fafc; border-radius: 8px; }
  .vtr-stat-val { font-size: 20px; font-weight: 700; color: #1a1a2e; }
  .vtr-stat-lbl { font-size: 10.5px; color: #888; margin-top: 2px; }
  .table-toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .filter-group { display: flex; align-items: center; gap: 8px; }
  .filter-label { font-size: 12px; font-weight: 600; color: #555; }
  select, input[type="text"], input[type="date"], input[type="number"] { border: 1.5px solid #e2e8f0; border-radius: 8px; padding: 7px 12px; font-size: 13px; color: #1a1a2e; background: #fff; outline: none; transition: border 0.2s; }
  select:focus, input:focus { border-color: #29ABE2; }
  .btn { padding: 8px 18px; border-radius: 8px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; }
  .btn-primary { background: #29ABE2; color: #fff; }
  .btn-primary:hover { background: #1a96cc; }
  .btn-secondary { background: #f1f5f9; color: #475569; }
  .btn-secondary:hover { background: #e2e8f0; }
  .btn-danger { background: #fee2e2; color: #dc2626; }
  .btn-danger:hover { background: #fecaca; }
  .btn-success { background: #dcfce7; color: #16a34a; }
  .btn-success:hover { background: #bbf7d0; }
  .btn-sm { padding: 5px 12px; font-size: 12px; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .ml-auto { margin-left: auto; }

  /* Setup screen */

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

// ─── CONFIGURAÇÃO ────────────────────────────────────────────────────────────
// Cole aqui a URL do seu Apps Script após publicar:
const SCRIPT_URL_KEY = 'controle_vtr_script_url';

// ── Dados padrão (fallback) ───────────────────────────────────────────────────
const VEICULOS_DEFAULT = [
  {placa:'TRZ4A58', nome:'Mobi'},
  {placa:'TAF3J08', nome:'Montana'},
];
const MOTORISTAS_FULL_DEFAULT = [
  {nome:'JEAN FRANCISCO', cpf:''},
  {nome:'DILERMANDO',     cpf:'03601744260'},
  {nome:'NETO',           cpf:'00744223245'},
  {nome:'FELIPE',         cpf:'97901504234'},
  {nome:'LEANDRO',        cpf:'70168231212'},
  {nome:'CAMILA',         cpf:'00748152296'},
  {nome:'JEAN',           cpf:'02297749201'},
];

// Lê do localStorage e normaliza (suporta formato antigo string[] e novo objeto[])
const _rawCarros = (() => { try { return JSON.parse(localStorage.getItem('penta_carros')||'null'); } catch(e){return null;} })();
const _rawMotoristas = (() => { try { return JSON.parse(localStorage.getItem('penta_motoristas')||'null'); } catch(e){return null;} })();

const VEICULOS_LIST = (_rawCarros && _rawCarros.length)
  ? _rawCarros.map(x => typeof x === 'string' ? {placa:x, nome:x} : x)
  : VEICULOS_DEFAULT;
const MOTORISTAS_LIST = (_rawMotoristas && _rawMotoristas.length)
  ? _rawMotoristas.map(x => typeof x === 'string' ? {nome:x, cpf:''} : x)
  : MOTORISTAS_FULL_DEFAULT;

// Arrays de strings para compatibilidade com todo o código existente
const CARROS = VEICULOS_LIST.map(v => v.placa);
const MOTORISTAS = MOTORISTAS_LIST.map(m => m.nome);
const MESES_ORDER = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
const MESES_LABEL = {jan:'Janeiro',fev:'Fevereiro',mar:'Março',abr:'Abril',mai:'Maio',jun:'Junho',jul:'Julho',ago:'Agosto',set:'Setembro',out:'Outubro',nov:'Novembro',dez:'Dezembro'};
const VTR_NAMES = Object.fromEntries(VEICULOS_LIST.map(v => [v.placa, `${v.nome} (${v.placa})`]));
// Cores dinâmicas por índice — funciona para qualquer quantidade de carros cadastrados
const VTR_COLOR = Object.fromEntries(VEICULOS_LIST.map((v,i) => [v.placa, `vtr-c${Math.min(i,5)}`]));
const VTR_BADGE_COLOR = Object.fromEntries(VEICULOS_LIST.map((v,i) => [v.placa, `badge-c${Math.min(i,5)}`]));
const PAGE_SIZE = 20;

// ─── API ──────────────────────────────────────────────────────────────────────
async function apiGet(url) {
  const res = await fetch(url, { redirect: 'follow' });
  const data = await res.json();
  if (!data.success) throw new Error(data.error || 'Erro desconhecido');
  return data.data;
}

async function apiPost(url, body) {
  const res = await fetch(url, {
    method: 'POST',
    redirect: 'follow',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(body),
  });
  const data = await res.json();
  if (!data.success) throw new Error(data.error || 'Erro desconhecido');
  return data;
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const fmt = {
  brl: v => v != null ? `R$ ${Number(v).toFixed(2).replace('.',',')}` : '-',
  num: v => v != null ? Number(v).toLocaleString('pt-BR') : '-',
  dec: (v,d=2) => v != null ? Number(v).toFixed(d).replace('.',',') : '-',
  date: s => s ? new Date(s+'T12:00:00').toLocaleDateString('pt-BR') : '-',
};

function getMes(dateStr) {
  if (!dateStr) return '';
  return MESES_ORDER[new Date(dateStr+'T12:00:00').getMonth()];
}

// ─── CHARTS ──────────────────────────────────────────────────────────────────
function BarChart({ labels, datasets }) {
  const ref = useRef(); const cRef = useRef();
  useEffect(() => {
    if (cRef.current) { cRef.current.destroy(); }
    cRef.current = new Chart(ref.current, {
      type: 'bar', data: { labels, datasets },
      options: { responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'bottom', labels: { font: { size: 11 }, padding: 10 } } },
        scales: { x: { grid: { display: false }, ticks: { font: { size: 11 } } }, y: { grid: { color: '#f1f5f9' }, ticks: { font: { size: 11 } } } }
      }
    });
    return () => { if (cRef.current) cRef.current.destroy(); };
  }, [JSON.stringify(labels), JSON.stringify(datasets)]);
  return <canvas ref={ref} style={{height:220}} />;
}

function LineChart({ labels, datasets }) {
  const ref = useRef(); const cRef = useRef();
  useEffect(() => {
    if (cRef.current) { cRef.current.destroy(); }
    cRef.current = new Chart(ref.current, {
      type: 'line', data: { labels, datasets },
      options: { responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'bottom', labels: { font: { size: 11 }, padding: 10 } } },
        scales: { x: { grid: { display: false }, ticks: { font: { size: 11 } } }, y: { grid: { color: '#f1f5f9' }, ticks: { font: { size: 11 } } } },
        elements: { line: { tension: 0.3 } }
      }
    });
    return () => { if (cRef.current) cRef.current.destroy(); };
  }, [JSON.stringify(labels), JSON.stringify(datasets)]);
  return <canvas ref={ref} style={{height:220}} />;
}

// ─── SETUP SCREEN ────────────────────────────────────────────────────────────
function SetupScreen({ onSave }) {
  const [url, setUrl] = useState('');
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');

  const handleTest = async () => {
    if (!url.trim()) { setErr('Cole a URL do Apps Script acima.'); return; }
    setLoading(true); setErr('');
    try {
      await apiGet(url.trim());
      onSave(url.trim());
    } catch(e) {
      setErr('Não foi possível conectar. Verifique se a URL está correta e se o script está publicado com acesso "Qualquer pessoa".');
    }
    setLoading(false);
  };

  return (
    <div className="setup-overlay">
      <div className="setup-box">
        <h2>🚗 Controle de Veículos 2026</h2>
        <p>Para sincronizar com o Google Sheets, cole abaixo a URL do seu Apps Script. Siga os passos:</p>
        <div className="setup-hint">
          <div className="step"><div className="step-num">1</div><div>Abra sua planilha no Google Sheets e clique em <strong>Extensões → Apps Script</strong></div></div>
          <div className="step"><div className="step-num">2</div><div>Cole o conteúdo do arquivo <code>apps_script.gs</code> no editor e salve (<strong>Ctrl+S</strong>)</div></div>
          <div className="step"><div className="step-num">3</div><div>Clique em <strong>Executar → setup()</strong> para importar os dados iniciais (faça isso apenas uma vez)</div></div>
          <div className="step"><div className="step-num">4</div><div>Clique em <strong>Implantar → Nova implantação</strong> → Tipo: <strong>App da Web</strong> → Executar como: <strong>Eu</strong> → Acesso: <strong>Qualquer pessoa</strong></div></div>
          <div className="step"><div className="step-num">5</div><div>Copie a <strong>URL da implantação</strong> e cole abaixo</div></div>
        </div>
        <input
          type="text"
          placeholder="https://script.google.com/macros/s/AKfycb.../exec"
          value={url}
          onChange={e => setUrl(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && handleTest()}
        />
        {err && <p style={{color:'#ef4444', fontSize:'13px', marginBottom:'12px'}}>{err}</p>}
        <button className="btn btn-primary" style={{width:'100%', padding:'13px', fontSize:'15px'}} onClick={handleTest} disabled={loading}>
          {loading ? '⏳ Conectando...' : '🔗 Conectar ao Google Sheets'}
        </button>
      </div>
    </div>
  );
}

// ─── MODAL FORM ──────────────────────────────────────────────────────────────
const EMPTY_FORM = { data:'', vtr:'TRZ4A58', motorista:'DILERMANDO', km_inicial:'', km_final:'', abasteceu:'NÃO', km_abst:'', valor_abast:'', preco_litro:'', litros:'', mes:'', tipo_combustivel:'gasolina', nivel_inicio:'', nivel_fim:'' };

function RecordModal({ record, onSave, onClose, saving }) {
  const [form, setForm] = useState(() => record ? {
    ...record,
    km_abst: record.km_abst ?? '',
    valor_abast: record.valor_abast ?? '',
    preco_litro: record.preco_litro ?? '',
    litros: record.litros ?? '',
    tipo_combustivel: record.tipo_combustivel || 'gasolina',
    nivel_inicio: record.nivel_inicio ?? '',
    nivel_fim: record.nivel_fim ?? '',
  } : { ...EMPTY_FORM });

  const set = (k, v) => setForm(f => {
    const next = { ...f, [k]: v };
    if (k === 'data') next.mes = getMes(v);
    if (k === 'km_inicial' || k === 'km_final') {
      const ini = parseFloat(k === 'km_inicial' ? v : next.km_inicial) || 0;
      const fin = parseFloat(k === 'km_final' ? v : next.km_final) || 0;
      if (ini && fin && fin >= ini) next.km_dia = fin - ini;
    }
    if ((k === 'valor_abast' || k === 'preco_litro')) {
      const val = parseFloat(k === 'valor_abast' ? v : next.valor_abast);
      const preco = parseFloat(k === 'preco_litro' ? v : next.preco_litro);
      if (val > 0 && preco > 0) next.litros = (val / preco).toFixed(2);
    }
    return next;
  });

  const handleSave = () => {
    if (!form.data || !form.vtr || !form.motorista || !form.km_inicial || !form.km_final) {
      alert('Preencha os campos obrigatórios: Data, VTR, Motorista, KM Inicial e KM Final.');
      return;
    }
    onSave({
      ...form,
      id: record?.id,
      km_inicial: parseInt(form.km_inicial) || 0,
      km_final: parseInt(form.km_final) || 0,
      km_dia: (parseInt(form.km_final) || 0) - (parseInt(form.km_inicial) || 0),
      km_abst: form.km_abst ? parseInt(form.km_abst) : null,
      valor_abast: form.valor_abast ? parseFloat(form.valor_abast) : null,
      preco_litro: form.preco_litro ? parseFloat(form.preco_litro) : null,
      litros: form.litros ? parseFloat(form.litros) : null,
      mes: getMes(form.data),
      tipo_combustivel: form.abasteceu === 'SIM' ? (form.tipo_combustivel || 'gasolina') : '',
      nivel_inicio: form.nivel_inicio,
      nivel_fim: form.nivel_fim,
    });
  };

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-header">
          <h3>{record ? '✏️ Editar Registro' : '➕ Novo Registro'}</h3>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>
        <div className="modal-body">
          <div className="form-grid">
            <div className="form-group">
              <label>Data *</label>
              <input type="date" value={form.data} onChange={e => set('data', e.target.value)} />
            </div>
            <div className="form-group">
              <label>VTR *</label>
              <select value={form.vtr} onChange={e => set('vtr', e.target.value)}>
                {CARROS.map(c => <option key={c} value={c}>{VTR_NAMES[c]}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label>Motorista *</label>
              <select value={form.motorista} onChange={e => set('motorista', e.target.value)}>
                {MOTORISTAS.map(m => <option key={m} value={m}>{m}</option>)}
              </select>
            </div>
            <div className="form-group">
              <label>Mês</label>
              <input type="text" value={form.mes ? (MESES_LABEL[form.mes] || form.mes) : ''} readOnly style={{background:'#f8fafc',color:'#888'}} />
              <span className="hint">Calculado pela data</span>
            </div>
            <div className="form-section">Quilometragem</div>
            <div className="form-group">
              <label>KM Inicial *</label>
              <input type="number" value={form.km_inicial} onChange={e => set('km_inicial', e.target.value)} />
            </div>
            <div className="form-group">
              <label>KM Final *</label>
              <input type="number" value={form.km_final} onChange={e => set('km_final', e.target.value)} />
            </div>
            <div className="form-group">
              <label>KM Rodados</label>
              <input type="number" value={form.km_dia || ''} readOnly style={{background:'#f8fafc',color:'#555'}} />
            </div>
            <div className="form-section">Abastecimento</div>
            <div className="form-group">
              <label>Abasteceu?</label>
              <select value={form.abasteceu} onChange={e => set('abasteceu', e.target.value)}>
                <option value="NÃO">NÃO</option>
                <option value="SIM">SIM</option>
              </select>
            </div>
            {form.abasteceu === 'SIM' && <>
              <div className="form-group" style={{gridColumn:'1/-1'}}>
                <label>Tipo de Combustível</label>
                <div style={{display:'flex',gap:'10px',marginTop:'4px'}}>
                  <button type="button"
                    onClick={() => set('tipo_combustivel','gasolina')}
                    style={{flex:1,padding:'9px 0',borderRadius:8,border:'2px solid',cursor:'pointer',fontWeight:600,fontSize:'14px',
                      borderColor: form.tipo_combustivel==='gasolina' ? '#dc2626' : '#e2e8f0',
                      background: form.tipo_combustivel==='gasolina' ? '#fef2f2' : '#f8fafc',
                      color: form.tipo_combustivel==='gasolina' ? '#dc2626' : '#64748b'}}>
                    🔴 Gasolina
                  </button>
                  <button type="button"
                    onClick={() => set('tipo_combustivel','alcool')}
                    style={{flex:1,padding:'9px 0',borderRadius:8,border:'2px solid',cursor:'pointer',fontWeight:600,fontSize:'14px',
                      borderColor: form.tipo_combustivel==='alcool' ? '#16a34a' : '#e2e8f0',
                      background: form.tipo_combustivel==='alcool' ? '#f0fdf4' : '#f8fafc',
                      color: form.tipo_combustivel==='alcool' ? '#16a34a' : '#64748b'}}>
                    🟢 Álcool
                  </button>
                </div>
              </div>
              <div className="form-group">
                <label>Nível Início</label>
                <select value={form.nivel_inicio} onChange={e => set('nivel_inicio', e.target.value)}>
                  <option value="">—</option>
                  <option value="reserva">Reserva</option>
                  <option value="1/4">1/4</option>
                  <option value="1/2">1/2</option>
                  <option value="3/4">3/4</option>
                  <option value="cheio">Cheio</option>
                </select>
              </div>
              <div className="form-group">
                <label>Nível Fim</label>
                <select value={form.nivel_fim} onChange={e => set('nivel_fim', e.target.value)}>
                  <option value="">—</option>
                  <option value="reserva">Reserva</option>
                  <option value="1/4">1/4</option>
                  <option value="1/2">1/2</option>
                  <option value="3/4">3/4</option>
                  <option value="cheio">Cheio</option>
                </select>
              </div>
              <div className="form-group">
                <label>KM no Abastecimento</label>
                <input type="number" value={form.km_abst} onChange={e => set('km_abst', e.target.value)} />
              </div>
              <div className="form-group">
                <label>Valor (R$)</label>
                <input type="number" step="0.01" value={form.valor_abast} onChange={e => set('valor_abast', e.target.value)} placeholder="ex: 100.00" />
              </div>
              <div className="form-group">
                <label>Preço/Litro (R$)</label>
                <input type="number" step="0.01" value={form.preco_litro} onChange={e => set('preco_litro', e.target.value)} placeholder="ex: 6.99" />
              </div>
              <div className="form-group">
                <label>Litros</label>
                <input type="number" step="0.01" value={form.litros} onChange={e => set('litros', e.target.value)} />
                <span className="hint">Calculado automaticamente</span>
              </div>
            </>}
          </div>
        </div>
        <div className="modal-footer">
          <button className="btn btn-secondary" onClick={onClose}>Cancelar</button>
          <button className="btn btn-primary" onClick={handleSave} disabled={saving}>
            {saving ? '⏳ Salvando...' : (record ? 'Salvar alterações' : 'Adicionar registro')}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function Dashboard({ records }) {
  const totalKm = records.reduce((s, r) => s + (r.km_dia || 0), 0);
  const totalAbast = records.filter(r => r.abasteceu === 'SIM').reduce((s, r) => s + (r.valor_abast || 0), 0);
  const totalLitros = records.filter(r => r.litros).reduce((s, r) => s + r.litros, 0);
  const kmL = totalLitros > 0 ? totalKm / totalLitros : 0;
  const abastCount = records.filter(r => r.abasteceu === 'SIM').length;
  const meses = [...new Set(records.map(r => r.mes))].sort((a,b) => MESES_ORDER.indexOf(a) - MESES_ORDER.indexOf(b));

  const kmMesData = {
    labels: meses.map(m => MESES_LABEL[m] || m),
    datasets: CARROS.map((vtr, i) => ({
      label: VTR_NAMES[vtr],
      data: meses.map(m => records.filter(r => r.vtr === vtr && r.mes === m).reduce((s, r) => s + (r.km_dia || 0), 0)),
      backgroundColor: i === 0 ? '#3b82f680' : '#29ABE280',
      borderColor: i === 0 ? '#3b82f6' : '#29ABE2',
      borderWidth: 2,
    }))
  };

  const custoMesData = {
    labels: meses.map(m => MESES_LABEL[m] || m),
    datasets: CARROS.map((vtr, i) => ({
      label: VTR_NAMES[vtr],
      data: meses.map(m => records.filter(r => r.vtr === vtr && r.mes === m && r.abasteceu === 'SIM').reduce((s, r) => s + (r.valor_abast || 0), 0)),
      borderColor: i === 0 ? '#3b82f6' : '#29ABE2',
      backgroundColor: i === 0 ? '#3b82f620' : '#29ABE220',
      borderWidth: 2, fill: true,
    }))
  };

  const vtrStats = CARROS.map(vtr => {
    const vRecs = records.filter(r => r.vtr === vtr);
    const km = vRecs.reduce((s, r) => s + (r.km_dia || 0), 0);
    const gasto = vRecs.filter(r => r.abasteceu === 'SIM').reduce((s, r) => s + (r.valor_abast || 0), 0);
    const lts = vRecs.filter(r => r.litros).reduce((s, r) => s + r.litros, 0);
    return { vtr, km, gasto, kml: lts > 0 ? km / lts : 0 };
  });

  return (
    <div>
      <div className="cards-grid">
        <div className="card" style={{'--accent':'#3b82f6','--bg':'#eff6ff'}}>
          <div className="card-icon">🛣️</div>
          <div className="card-label">KM Total Rodado</div>
          <div className="card-value">{totalKm.toLocaleString('pt-BR')}</div>
          <div className="card-sub">{records.length} registros</div>
        </div>
        <div className="card" style={{'--accent':'#29ABE2','--bg':'#fff0f3'}}>
          <div className="card-icon">⛽</div>
          <div className="card-label">Total Combustível</div>
          <div className="card-value">R$ {totalAbast.toLocaleString('pt-BR',{maximumFractionDigits:0})}</div>
          <div className="card-sub">{abastCount} abastecimentos</div>
        </div>
        <div className="card" style={{'--accent':'#8b5cf6','--bg':'#f5f3ff'}}>
          <div className="card-icon">📊</div>
          <div className="card-label">Eficiência Média</div>
          <div className="card-value">{fmt.dec(kmL,2)} km/L</div>
          <div className="card-sub">{fmt.dec(totalLitros,1)} litros total</div>
        </div>
        <div className="card" style={{'--accent':'#22c55e','--bg':'#f0fdf4'}}>
          <div className="card-icon">🚗</div>
          <div className="card-label">Veículos Ativos</div>
          <div className="card-value">{CARROS.length}</div>
          <div className="card-sub">{meses.length} meses de dados</div>
        </div>
      </div>
      <div className="vtr-cards">
        {vtrStats.map((s, idx) => {
          const veiculo = VEICULOS_LIST.find(v => v.placa === s.vtr);
          const nomeVtr = veiculo ? veiculo.nome : s.vtr;
          return (
          <div className="vtr-card" key={s.vtr}>
            <div className="vtr-card-header">
              <span className={`vtr-badge ${VTR_COLOR[s.vtr]||'vtr-c0'}`}>{s.vtr}</span>
              <div className="vtr-card-title">{nomeVtr}</div>
            </div>
            <div className="vtr-stats">
              <div className="vtr-stat"><div className="vtr-stat-val">{s.km.toLocaleString('pt-BR')}</div><div className="vtr-stat-lbl">KM Rodados</div></div>
              <div className="vtr-stat"><div className="vtr-stat-val">R${s.gasto.toLocaleString('pt-BR',{maximumFractionDigits:0})}</div><div className="vtr-stat-lbl">Combustível</div></div>
              <div className="vtr-stat"><div className="vtr-stat-val">{fmt.dec(s.kml,1)}</div><div className="vtr-stat-lbl">km/L</div></div>
            </div>
          </div>
          );
        })}
      </div>
      <div className="charts-row">
        <div className="chart-card">
          <h3>📍 KM Rodados por Mês</h3>
          <div className="chart-wrap"><BarChart labels={kmMesData.labels} datasets={kmMesData.datasets} /></div>
        </div>
        <div className="chart-card">
          <h3>⛽ Custo de Combustível por Mês</h3>
          <div className="chart-wrap"><LineChart labels={custoMesData.labels} datasets={custoMesData.datasets} /></div>
        </div>
      </div>

      {/* Fuel price evolution chart */}
      {(() => {
        const abastRecs = records
          .filter(r => r.abasteceu === 'SIM' && r.litros > 0 && r.valor_abast > 0)
          .map(r => ({
            data: r.data || '',
            precoL: parseFloat((r.valor_abast / r.litros).toFixed(3)),
            tipo: (r.tipo_combustivel || '').toLowerCase(),
            dataSort: (r.data || '').split('/').reverse().join('')
          }))
          .sort((a, b) => a.dataSort.localeCompare(b.dataSort));

        if (abastRecs.length === 0) return null;

        const hasTipo = abastRecs.some(r => r.tipo === 'gasolina' || r.tipo === 'alcool' || r.tipo === 'álcool' || r.tipo === 'etanol');

        let precoLabels, precoDatasets;
        if (hasTipo) {
          const gasolinaRecs = abastRecs.filter(r => r.tipo === 'gasolina');
          const alcoolRecs   = abastRecs.filter(r => r.tipo === 'alcool' || r.tipo === 'álcool' || r.tipo === 'etanol');
          const allDates = [...new Set(abastRecs.map(r => r.data))];
          precoLabels = allDates;
          precoDatasets = [
            {
              label: '🔴 Gasolina (R$/L)',
              data: allDates.map(d => { const r = gasolinaRecs.find(x => x.data === d); return r ? r.precoL : null; }),
              borderColor: '#dc2626', backgroundColor: '#dc262620',
              borderWidth: 2, fill: false, pointRadius: 6, spanGaps: false, tension: 0.3
            },
            {
              label: '🟢 Álcool (R$/L)',
              data: allDates.map(d => { const r = alcoolRecs.find(x => x.data === d); return r ? r.precoL : null; }),
              borderColor: '#16a34a', backgroundColor: '#16a34a20',
              borderWidth: 2, fill: false, pointRadius: 6, spanGaps: false, tension: 0.3
            }
          ];
        } else {
          precoLabels = abastRecs.map(r => r.data);
          precoDatasets = [{
            label: 'Preço R$/Litro',
            data: abastRecs.map(r => r.precoL),
            borderColor: '#f97316', backgroundColor: '#f9731620',
            borderWidth: 2.5, fill: true, pointRadius: 6, pointHoverRadius: 8, tension: 0.3
          }];
        }

        return (
          <div className="chart-card" style={{marginTop:16}}>
            <h3>⛽ Evolução do Preço de Combustível (R$/Litro)</h3>
            <div className="chart-wrap" style={{height:240}}>
              <LineChart labels={precoLabels} datasets={precoDatasets} />
            </div>
          </div>
        );
      })()}
    </div>
  );
}

// ─── RECORDS TABLE ────────────────────────────────────────────────────────────
function RecordsTable({ records, scriptUrl, onRefresh, showToast }) {
  const [filterVtr, setFilterVtr] = useState('');
  const [filterMotorista, setFilterMotorista] = useState('');
  const [filterMes, setFilterMes] = useState('');
  const [filterAbast, setFilterAbast] = useState('');
  const [sortBy, setSortBy] = useState('data_desc');
  const [page, setPage] = useState(1);
  const [modalOpen, setModalOpen] = useState(false);
  const [editRecord, setEditRecord] = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [saving, setSaving] = useState(false);
  const [selectedIds, setSelectedIds] = useState(new Set());

  const toggleSelect = (id) => setSelectedIds(prev => {
    const next = new Set(prev);
    if (next.has(id)) next.delete(id); else next.add(id);
    return next;
  });

  const filtered = useMemo(() => {
    const list = records.filter(r =>
      (!filterVtr || r.vtr === filterVtr) &&
      (!filterMotorista || r.motorista === filterMotorista) &&
      (!filterMes || r.mes === filterMes) &&
      (!filterAbast || r.abasteceu === filterAbast)
    );
    return [...list].sort((a, b) => {
      switch (sortBy) {
        case 'data_desc':  return (b.data||'').localeCompare(a.data||'');
        case 'data_asc':   return (a.data||'').localeCompare(b.data||'');
        case 'vtr_az':     return (a.vtr||'').localeCompare(b.vtr||'');
        case 'vtr_za':     return (b.vtr||'').localeCompare(a.vtr||'');
        case 'motorista_az': return (a.motorista||'').localeCompare(b.motorista||'');
        case 'motorista_za': return (b.motorista||'').localeCompare(a.motorista||'');
        case 'km_desc':    return (b.km_dia||0) - (a.km_dia||0);
        case 'km_asc':     return (a.km_dia||0) - (b.km_dia||0);
        default: return 0;
      }
    });
  }, [records, filterVtr, filterMotorista, filterMes, filterAbast, sortBy]);

  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  const paged = filtered.slice((page - 1) * PAGE_SIZE, page * PAGE_SIZE);
  const meses = [...new Set(records.map(r => r.mes))].sort((a,b) => MESES_ORDER.indexOf(a) - MESES_ORDER.indexOf(b));

  const handleSave = async (data) => {
    setSaving(true);
    try {
      if (editRecord) {
        await apiPost(scriptUrl, { action: 'update', data });
        showToast('✅ Registro atualizado na planilha!', 'success');
      } else {
        await apiPost(scriptUrl, { action: 'add', data });
        showToast('✅ Registro adicionado na planilha!', 'success');
      }
      setModalOpen(false); setEditRecord(null);
      await onRefresh();
    } catch(e) {
      showToast('❌ Erro: ' + e.message, 'error');
    }
    setSaving(false);
  };

  const handleDelete = async (id) => {
    setSaving(true);
    try {
      await apiPost(scriptUrl, { action: 'delete', id });
      showToast('✅ Registro removido da planilha!', 'success');
      setConfirmDelete(null);
      await onRefresh();
    } catch(e) {
      showToast('❌ Erro: ' + e.message, 'error');
    }
    setSaving(false);
  };

  const handleDeleteSelected = async () => {
    if (!selectedIds.size) return;
    setSaving(true);
    let erros = 0;
    for (const id of selectedIds) {
      try { await apiPost(scriptUrl, { action: 'delete', id }); }
      catch(e) { erros++; }
    }
    setSelectedIds(new Set());
    await onRefresh();
    if (erros) showToast(`⚠️ ${erros} erro(s) ao excluir.`, 'error');
    else showToast(`✅ ${selectedIds.size > 0 ? selectedIds.size : 'Registros'} removido(s)!`, 'success');
    setSaving(false);
  };

  return (
    <div>
      <div className="table-toolbar">
        <div className="filter-group">
          <span className="filter-label">VTR:</span>
          <select value={filterVtr} onChange={e => { setFilterVtr(e.target.value); setPage(1); }}>
            <option value="">Todas</option>
            {CARROS.map(c => <option key={c} value={c}>{c}</option>)}
          </select>
        </div>
        <div className="filter-group">
          <span className="filter-label">Motorista:</span>
          <select value={filterMotorista} onChange={e => { setFilterMotorista(e.target.value); setPage(1); }}>
            <option value="">Todos</option>
            {MOTORISTAS.map(m => <option key={m} value={m}>{m}</option>)}
          </select>
        </div>
        <div className="filter-group">
          <span className="filter-label">Mês:</span>
          <select value={filterMes} onChange={e => { setFilterMes(e.target.value); setPage(1); }}>
            <option value="">Todos</option>
            {meses.map(m => <option key={m} value={m}>{MESES_LABEL[m] || m}</option>)}
          </select>
        </div>
        <div className="filter-group">
          <span className="filter-label">Abast.:</span>
          <select value={filterAbast} onChange={e => { setFilterAbast(e.target.value); setPage(1); }}>
            <option value="">Todos</option>
            <option value="SIM">SIM</option>
            <option value="NÃO">NÃO</option>
          </select>
        </div>
        {(filterVtr || filterMotorista || filterMes || filterAbast) &&
          <button className="btn btn-secondary btn-sm" onClick={() => { setFilterVtr(''); setFilterMotorista(''); setFilterMes(''); setFilterAbast(''); setPage(1); }}>✕ Limpar</button>}
        <div className="filter-group" style={{marginLeft:'auto'}}>
          <span className="filter-label">Ordenar:</span>
          <select value={sortBy} onChange={e => { setSortBy(e.target.value); setPage(1); }}>
            <option value="data_desc">📅 Mais recente</option>
            <option value="data_asc">📅 Mais antigo</option>
            <option value="vtr_az">🚗 Viatura A→Z</option>
            <option value="vtr_za">🚗 Viatura Z→A</option>
            <option value="motorista_az">👤 Motorista A→Z</option>
            <option value="motorista_za">👤 Motorista Z→A</option>
            <option value="km_desc">📍 Maior KM/dia</option>
            <option value="km_asc">📍 Menor KM/dia</option>
          </select>
        </div>
        <div style={{display:'flex',gap:'8px'}}>
          <button className="btn btn-secondary btn-sm" onClick={onRefresh}>🔄 Atualizar</button>
          <button className="btn btn-primary" onClick={() => { setEditRecord(null); setModalOpen(true); }}>+ Novo Registro</button>
        </div>
      </div>

      {/* ── Barra de seleção múltipla ── */}
      {selectedIds.size > 0 && (
        <div style={{background:'#fef2f2',border:'1px solid #fca5a5',borderRadius:10,padding:'10px 18px',marginBottom:12,display:'flex',alignItems:'center',gap:12}}>
          <span style={{fontWeight:600,color:'#dc2626',fontSize:'14px'}}>🗑️ {selectedIds.size} registro(s) selecionado(s)</span>
          <button className="btn btn-danger btn-sm" disabled={saving}
            onClick={() => { if (window.confirm(`Excluir ${selectedIds.size} registro(s) permanentemente?`)) handleDeleteSelected(); }}>
            {saving ? '⏳ Excluindo...' : 'Excluir Selecionados'}
          </button>
          <button className="btn btn-secondary btn-sm" onClick={() => setSelectedIds(new Set())}>Cancelar</button>
        </div>
      )}

      <div className="table-container">
        <table>
          <thead>
            <tr>
              <th style={{width:36}}>
                <input type="checkbox" title="Selecionar página"
                  checked={paged.length > 0 && paged.every(r => selectedIds.has(r.id))}
                  onChange={() => {
                    const allSel = paged.every(r => selectedIds.has(r.id));
                    setSelectedIds(prev => {
                      const next = new Set(prev);
                      paged.forEach(r => allSel ? next.delete(r.id) : next.add(r.id));
                      return next;
                    });
                  }} />
              </th>
              <th>#</th><th>Data</th><th>VTR</th><th>Motorista</th>
              <th>KM Inicial</th><th>KM Final</th><th>KM Dia</th>
              <th>Abast.</th><th>Valor</th><th>Preço/L</th><th>Litros</th><th>Mês</th><th>Ações</th>
            </tr>
          </thead>
          <tbody>
            {paged.length === 0 && <tr><td colSpan="14"><div className="empty-state"><div className="empty-state-icon">🔍</div><p>Nenhum registro encontrado.</p></div></td></tr>}
            {paged.map(r => (
              <tr key={r.id} style={selectedIds.has(r.id) ? {background:'#fef2f2'} : {}}>
                <td style={{textAlign:'center'}}>
                  <input type="checkbox" checked={selectedIds.has(r.id)} onChange={() => toggleSelect(r.id)} />
                </td>
                <td style={{color:'#94a3b8',fontSize:'12px'}}>{r.id}</td>
                <td style={{fontWeight:500}}>{fmt.date(r.data)}</td>
                <td><span className={`badge ${VTR_BADGE_COLOR[r.vtr]||'badge-c0'}`}>{r.vtr}</span></td>
                <td>{r.motorista}</td>
                <td>{fmt.num(r.km_inicial)}</td>
                <td>{fmt.num(r.km_final)}</td>
                <td style={{fontWeight:600,color:r.km_dia>100?'#29ABE2':'#1a1a2e'}}>{r.km_dia}</td>
                <td>
                  {r.abasteceu === 'SIM' ? (
                    <span style={{fontSize:'11px',fontWeight:'700',padding:'2px 8px',borderRadius:'12px',
                      background: (r.tipo_combustivel||'gasolina').toLowerCase()==='gasolina' ? '#fef2f2' : '#f0fdf4',
                      color: (r.tipo_combustivel||'gasolina').toLowerCase()==='gasolina' ? '#dc2626' : '#16a34a',
                      border: `1px solid ${(r.tipo_combustivel||'gasolina').toLowerCase()==='gasolina' ? '#fca5a5' : '#86efac'}`
                    }}>{(r.tipo_combustivel||'gasolina').toLowerCase()==='gasolina' ? '🔴 Gasolina' : '🟢 Álcool'}</span>
                  ) : (
                    <span className="badge badge-nao">NÃO</span>
                  )}
                </td>
                <td>{r.valor_abast ? fmt.brl(r.valor_abast) : <span style={{color:'#cbd5e1'}}>-</span>}</td>
                <td>{r.preco_litro ? `R$ ${Number(r.preco_litro).toFixed(2).replace('.',',')}` : <span style={{color:'#cbd5e1'}}>-</span>}</td>
                <td>{r.litros ? `${Number(r.litros).toFixed(2).replace('.',',')} L` : <span style={{color:'#cbd5e1'}}>-</span>}</td>
                <td><span className="badge badge-mes">{r.mes}</span></td>
                <td>
                  <div className="actions">
                    <button className="btn btn-secondary btn-sm" onClick={() => { setEditRecord(r); setModalOpen(true); }}>✏️</button>
                    <button className="btn btn-danger btn-sm" onClick={() => setConfirmDelete(r)}>🗑️</button>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        <div className="pagination">
          <span>Mostrando {Math.min((page-1)*PAGE_SIZE+1, filtered.length)}–{Math.min(page*PAGE_SIZE, filtered.length)} de {filtered.length} registros</span>
          <div className="pagination-btns">
            <button className="page-btn" disabled={page===1} onClick={() => setPage(p=>p-1)}>‹</button>
            {Array.from({length:totalPages},(_,i)=>i+1).filter(p=>p===1||p===totalPages||Math.abs(p-page)<=1).reduce((acc,p,i,arr)=>{
              if(i>0&&arr[i-1]!==p-1)acc.push(<span key={`e${p}`} style={{padding:'0 4px',color:'#94a3b8'}}>…</span>);
              acc.push(<button key={p} className={`page-btn ${p===page?'active':''}`} onClick={()=>setPage(p)}>{p}</button>);
              return acc;
            },[])}
            <button className="page-btn" disabled={page===totalPages} onClick={() => setPage(p=>p+1)}>›</button>
          </div>
        </div>
      </div>

      {modalOpen && <RecordModal record={editRecord} onSave={handleSave} onClose={() => { setModalOpen(false); setEditRecord(null); }} saving={saving} />}

      {confirmDelete && (
        <div className="confirm-overlay">
          <div className="confirm-box">
            <div className="confirm-icon">🗑️</div>
            <h4>Excluir registro?</h4>
            <p>Registro #{confirmDelete.id} de {fmt.date(confirmDelete.data)} ({confirmDelete.vtr} — {confirmDelete.motorista}) será removido da planilha permanentemente.</p>
            <div className="confirm-btns">
              <button className="btn btn-secondary" onClick={() => setConfirmDelete(null)}>Cancelar</button>
              <button className="btn btn-danger" onClick={() => handleDelete(confirmDelete.id)} disabled={saving}>{saving ? '⏳...' : 'Excluir'}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── RELATÓRIO ────────────────────────────────────────────────────────────────
function RelatorioPage({ records }) {
  const today = new Date();
  const pad = d => d.toISOString().split('T')[0];

  const [dateFrom, setDateFrom] = useState('');
  const [dateTo,   setDateTo]   = useState('');
  const [activePreset, setActivePreset] = useState('');

  const applyPreset = (preset) => {
    const now = new Date();
    let from = new Date(now), to = new Date(now);
    switch (preset) {
      case 'semana_atual': {
        const d = now.getDay();
        from.setDate(now.getDate() - (d === 0 ? 6 : d - 1));
        to = new Date(from); to.setDate(from.getDate() + 4); break;
      }
      case 'semana_passada': {
        const d = now.getDay();
        from.setDate(now.getDate() - (d === 0 ? 6 : d - 1) - 7);
        to = new Date(from); to.setDate(from.getDate() + 4); break;
      }
      case '7dias':  { from.setDate(now.getDate() - 6); break; }
      case '15dias': { from.setDate(now.getDate() - 14); break; }
      case '30dias': { from.setDate(now.getDate() - 29); break; }
      case 'mes_atual': { from = new Date(now.getFullYear(), now.getMonth(), 1); break; }
      case 'mes_anterior': {
        from = new Date(now.getFullYear(), now.getMonth() - 1, 1);
        to   = new Date(now.getFullYear(), now.getMonth(), 0); break;
      }
      default: return;
    }
    setDateFrom(pad(from));
    setDateTo(pad(to));
    setActivePreset(preset);
  };

  const filtered = useMemo(() =>
    (!dateFrom && !dateTo) ? [] :
    records.filter(r => r.data && (!dateFrom || r.data >= dateFrom) && (!dateTo || r.data <= dateTo)),
    [records, dateFrom, dateTo]
  );

  const summary = useMemo(() => CARROS.map(vtr => {
    const recs = filtered.filter(r => r.vtr === vtr);
    if (!recs.length) return null;
    const sorted = [...recs].sort((a,b) => a.data.localeCompare(b.data));
    const kmRodado   = recs.reduce((s,r) => s + (r.km_dia||0), 0);
    const abastRecs  = recs.filter(r => r.abasteceu === 'SIM');
    const totalL     = abastRecs.reduce((s,r) => s + (r.litros||0), 0);
    const totalR     = abastRecs.reduce((s,r) => s + (r.valor_abast||0), 0);
    const kml        = totalL > 0 ? kmRodado / totalL : null;
    return {
      vtr, kmRodado, totalL, totalR, kml,
      diasRodados: recs.length,
      abastQtd: abastRecs.length,
      dataInicio: sorted[0].data,
      dataFim: sorted[sorted.length-1].data,
      motoristas: [...new Set(recs.map(r => r.motorista))],
    };
  }).filter(Boolean), [filtered]);

  // Método tanque-cheio: usa TODOS os registros para calcular KM/L entre abastecimentos
  const kmlAbast = useMemo(() => CARROS.map(vtr => {
    const fills = records
      .filter(r => r.vtr === vtr && r.abasteceu === 'SIM' && r.km_abst)
      .sort((a,b) => a.data.localeCompare(b.data));
    return {
      vtr,
      rows: fills.map((r, i) => {
        if (i === 0) return { ...r, kmPerc: null, kml: null, isRef: true };
        const prev = fills[i-1];
        const kmPerc = r.km_abst - prev.km_abst;
        const kml = r.litros > 0 ? kmPerc / r.litros : null;
        return { ...r, kmPerc, kml, isRef: false };
      })
    };
  }), [records]);

  const PRESETS = [
    {key:'semana_atual',   label:'Esta semana'},
    {key:'semana_passada', label:'Semana passada'},
    {key:'7dias',          label:'Últimos 7 dias'},
    {key:'15dias',         label:'Últimos 15 dias'},
    {key:'30dias',         label:'Últimos 30 dias'},
    {key:'mes_atual',      label:'Este mês'},
    {key:'mes_anterior',   label:'Mês anterior'},
  ];

  const kmlClass = v => v == null ? 'kml-none' : v >= 7 ? 'kml-good' : v >= 5 ? 'kml-warn' : 'kml-bad';
  const kmlColor = v => v == null ? '#94a3b8' : v >= 7 ? '#16a34a' : v >= 5 ? '#d97706' : '#dc2626';

  return (
    <div>
      {/* ── Seletor de período ── */}
      <div className="section-title" style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <span>📅 Relatório por Período</span>
        {summary.length > 0 && (
          <button className="btn btn-secondary btn-sm no-print" style={{fontSize:'13px',padding:'5px 14px'}}
            onClick={() => window.print()}>🖨️ Imprimir</button>
        )}
      </div>

      <div className="relatorio-presets">
        {PRESETS.map(p => (
          <button key={p.key}
            className={`preset-btn${activePreset===p.key?' active':''}`}
            onClick={() => applyPreset(p.key)}>{p.label}</button>
        ))}
        <button className={`preset-btn${activePreset==='custom'?' active':''}`}
          onClick={() => setActivePreset('custom')}>✏️ Personalizado</button>
      </div>

      <div className="period-picker">
        <span style={{fontSize:'13px',fontWeight:600,color:'#374151'}}>De:</span>
        <input type="date" value={dateFrom} onChange={e=>{setDateFrom(e.target.value);setActivePreset('custom');}} />
        <span style={{fontSize:'13px',fontWeight:600,color:'#374151'}}>Até:</span>
        <input type="date" value={dateTo}   onChange={e=>{setDateTo(e.target.value);setActivePreset('custom');}} />
        <span style={{fontSize:'12px',color:'#94a3b8',marginLeft:4}}>
          {filtered.length} registro(s) encontrado(s)
        </span>
      </div>

      {/* ── Tabela de resumo ── */}
      {!dateFrom && !dateTo ? (
        <div className="empty-state">
          <div className="empty-state-icon">📅</div>
          <p>Selecione um período acima para gerar o relatório.</p>
        </div>
      ) : summary.length === 0 ? (
        <div className="empty-state">
          <div className="empty-state-icon">📭</div>
          <p>Nenhum registro encontrado neste período.</p>
        </div>
      ) : (
        <div className="summary-table-wrap">
          <div className="summary-header">
            <h3>📋 Resumo da Frota — {fmt.date(dateFrom)} a {fmt.date(dateTo)}</h3>
          </div>
          <div style={{overflowX:'auto'}}>
          <table>
            <thead>
              <tr>
                <th>VTR</th>
                <th>1º dia</th>
                <th>Último dia</th>
                <th style={{textAlign:'center'}}>Dias</th>
                <th>KM Rodado</th>
                <th style={{textAlign:'center'}}>Abast.</th>
                <th>Litros (L)</th>
                <th>Total R$</th>
                <th>KM/L médio</th>
                <th>Motoristas</th>
              </tr>
            </thead>
            <tbody>
              {summary.map(s => (
                <tr key={s.vtr}>
                  <td><span className={`vtr-badge ${VTR_COLOR[s.vtr]||'vtr-c0'}`}>{s.vtr}</span></td>
                  <td>{fmt.date(s.dataInicio)}</td>
                  <td>{fmt.date(s.dataFim)}</td>
                  <td style={{textAlign:'center'}}>{s.diasRodados}</td>
                  <td style={{fontWeight:600}}>{fmt.num(s.kmRodado)} km</td>
                  <td style={{textAlign:'center'}}>{s.abastQtd}x</td>
                  <td>{s.totalL > 0 ? fmt.dec(s.totalL,2)+' L' : '—'}</td>
                  <td style={{fontWeight:600}}>{s.totalR > 0 ? fmt.brl(s.totalR) : '—'}</td>
                  <td className={kmlClass(s.kml)}>
                    {s.kml ? fmt.dec(s.kml,2)+' km/L' : '—'}
                  </td>
                  <td style={{fontSize:'12px',color:'#64748b'}}>{s.motoristas.join(', ')}</td>
                </tr>
              ))}
              {summary.length > 1 && (() => {
                const tot = {
                  km: summary.reduce((a,r)=>a+r.kmRodado,0),
                  L:  summary.reduce((a,r)=>a+r.totalL,0),
                  R:  summary.reduce((a,r)=>a+r.totalR,0),
                  d:  summary.reduce((a,r)=>a+r.diasRodados,0),
                };
                const kml = tot.L > 0 ? tot.km / tot.L : null;
                return (
                  <tr className="total-row">
                    <td colSpan={3}>TOTAL DA FROTA</td>
                    <td style={{textAlign:'center'}}>{tot.d}</td>
                    <td>{fmt.num(tot.km)} km</td>
                    <td></td>
                    <td>{fmt.dec(tot.L,2)} L</td>
                    <td>{fmt.brl(tot.R)}</td>
                    <td className={kmlClass(kml)}>{kml ? fmt.dec(kml,2)+' km/L' : '—'}</td>
                    <td></td>
                  </tr>
                );
              })()}
            </tbody>
          </table>
          </div>
        </div>
      )}

      {/* ── Detalhamento por Veículo ── */}
      {summary.length > 0 && (
        <>
          <div className="section-title" style={{marginTop:32}}>🚗 Detalhamento por Veículo — Registros do Período</div>
          {CARROS.map(vtr => {
            const recs = filtered.filter(r => r.vtr === vtr).sort((a,b) => a.data.localeCompare(b.data));
            if (!recs.length) return null;
            const totalKm = recs.reduce((s,r) => s+r.km_dia,0);
            const abastRecs = recs.filter(r => r.abasteceu==='SIM');
            return (
              <div className="summary-table-wrap" key={vtr} style={{marginBottom:24}}>
                <div className="summary-header">
                  <h3>
                    <span className={`vtr-badge ${VTR_COLOR[vtr]||'vtr-c0'}`}>{vtr}</span>
                    {VTR_NAMES[vtr]}
                  </h3>
                  <span style={{fontSize:12,color:'#94a3b8'}}>{recs.length} dia(s) • {fmt.num(totalKm)} km total • {abastRecs.length} abastecimento(s)</span>
                </div>
                <div style={{overflowX:'auto'}}>
                <table>
                  <thead>
                    <tr>
                      <th>Data</th>
                      <th>Motorista</th>
                      <th>KM Inicial</th>
                      <th>KM Final</th>
                      <th>KM Dia</th>
                      <th>Combustível</th>
                      <th>Litros</th>
                      <th>Valor</th>
                      <th>R$/L</th>
                      <th>Nível Início</th>
                      <th>Nível Fim</th>
                    </tr>
                  </thead>
                  <tbody>
                    {recs.map(r => {
                      const comb = (r.tipo_combustivel||'').toLowerCase();
                      return (
                        <tr key={r.id}>
                          <td style={{fontWeight:500}}>{fmt.date(r.data)}</td>
                          <td style={{fontSize:'12px'}}>{r.motorista}</td>
                          <td>{fmt.num(r.km_inicial)}</td>
                          <td>{fmt.num(r.km_final)}</td>
                          <td style={{fontWeight:700,color:r.km_dia>100?'#29ABE2':'#1a1a2e'}}>{fmt.num(r.km_dia)} km</td>
                          <td>
                            {r.abasteceu==='SIM' ? (
                              <span style={{fontSize:'11px',fontWeight:'700',padding:'2px 8px',borderRadius:'12px',
                                background: comb==='gasolina'||!comb ? '#fef2f2' : '#f0fdf4',
                                color: comb==='gasolina'||!comb ? '#dc2626' : '#16a34a',
                                border: `1px solid ${comb==='gasolina'||!comb ? '#fca5a5' : '#86efac'}`
                              }}>{comb==='gasolina'||!comb ? '🔴 Gasolina' : '🟢 Álcool'}</span>
                            ) : <span style={{color:'#94a3b8',fontSize:'12px'}}>—</span>}
                          </td>
                          <td>{r.litros ? fmt.dec(r.litros,2)+' L' : <span style={{color:'#cbd5e1'}}>—</span>}</td>
                          <td>{r.valor_abast ? fmt.brl(r.valor_abast) : <span style={{color:'#cbd5e1'}}>—</span>}</td>
                          <td style={{fontSize:'12px',color:'#64748b'}}>{r.preco_litro ? `R$ ${fmt.dec(r.preco_litro,2)}/L` : <span style={{color:'#cbd5e1'}}>—</span>}</td>
                          <td style={{fontSize:'12px',color:'#64748b'}}>{r.nivel_inicio || <span style={{color:'#cbd5e1'}}>—</span>}</td>
                          <td style={{fontSize:'12px',color:'#64748b'}}>{r.nivel_fim || <span style={{color:'#cbd5e1'}}>—</span>}</td>
                        </tr>
                      );
                    })}
                    <tr className="total-row">
                      <td colSpan={4}>SUBTOTAL {vtr}</td>
                      <td style={{fontWeight:700}}>{fmt.num(totalKm)} km</td>
                      <td>{abastRecs.length}x</td>
                      <td>{abastRecs.reduce((s,r)=>s+(r.litros||0),0) > 0 ? fmt.dec(abastRecs.reduce((s,r)=>s+(r.litros||0),0),2)+' L' : '—'}</td>
                      <td>{abastRecs.reduce((s,r)=>s+(r.valor_abast||0),0) > 0 ? fmt.brl(abastRecs.reduce((s,r)=>s+(r.valor_abast||0),0)) : '—'}</td>
                      <td colSpan={3}></td>
                    </tr>
                  </tbody>
                </table>
                </div>
              </div>
            );
          })}
        </>
      )}


    </div>
  );
}

// ─── CADASTRO MOTORISTAS E CARROS PAGE ───────────────────────────────────────
function CadastroMotoristasCarrosPage({ scriptUrl }) {
  const [authenticated, setAuthenticated] = React.useState(false);
  const [senhaInput, setSenhaInput] = React.useState('');
  const [senhaError, setSenhaError] = React.useState('');

  // Estado com formato de objetos
  const [carros, setCarros] = React.useState(() => {
    try {
      const d = JSON.parse(localStorage.getItem('penta_carros') || 'null');
      if (!d || !d.length) return VEICULOS_DEFAULT;
      return d.map(x => typeof x === 'string' ? {placa:x, nome:x} : x);
    } catch(e) { return VEICULOS_DEFAULT; }
  });
  const [motoristas, setMotoristas] = React.useState(() => {
    try {
      const d = JSON.parse(localStorage.getItem('penta_motoristas') || 'null');
      if (!d || !d.length) return MOTORISTAS_FULL_DEFAULT;
      return d.map(x => typeof x === 'string' ? {nome:x, cpf:''} : x);
    } catch(e) { return MOTORISTAS_FULL_DEFAULT; }
  });

  // Inputs para novo carro
  const [novaPlaca, setNovaPlaca] = React.useState('');
  const [novoModelo, setNovoModelo] = React.useState('');
  // Inputs para novo motorista
  const [novoNome, setNovoNome] = React.useState('');
  const [novoCpf, setNovoCpf] = React.useState('');
  const [saved, setSaved] = React.useState(false);

  const handleSenha = () => {
    if (senhaInput === '2311') setAuthenticated(true);
    else setSenhaError('Senha incorreta');
  };

  const addCarro = () => {
    const placa = novaPlaca.trim().toUpperCase();
    const nome  = novoModelo.trim() || placa;
    if (!placa || carros.some(c => c.placa === placa)) return;
    setCarros(c => [...c, {placa, nome}]);
    setNovaPlaca(''); setNovoModelo('');
  };

  const removeCarro = (placa) => setCarros(c => c.filter(x => x.placa !== placa));

  const addMotorista = () => {
    const nome = novoNome.trim().toUpperCase();
    const cpf  = novoCpf.replace(/\D/g,'');
    if (!nome || motoristas.some(m => m.nome === nome)) return;
    setMotoristas(m => [...m, {nome, cpf}]);
    setNovoNome(''); setNovoCpf('');
  };

  const removeMotorista = (nome) => setMotoristas(m => m.filter(x => x.nome !== nome));

  const handleSave = async () => {
    localStorage.setItem('penta_carros', JSON.stringify(carros));
    localStorage.setItem('penta_motoristas', JSON.stringify(motoristas));
    if (scriptUrl) {
      try {
        await fetch(scriptUrl, {
          method: 'POST', redirect: 'follow',
          headers: {'Content-Type': 'text/plain'},
          body: JSON.stringify({action: 'saveConfig', veiculos: carros, motoristas: motoristas})
        });
      } catch(e) {}
    }
    setSaved(true);
    setTimeout(() => window.location.reload(), 1200);
  };

  if (!authenticated) {
    return (
      <div style={{maxWidth:'380px',margin:'48px auto',padding:'28px',background:'white',borderRadius:'16px',boxShadow:'0 2px 12px rgba(0,0,0,0.1)'}}>
        <div style={{textAlign:'center',marginBottom:'24px'}}>
          <div style={{fontSize:'40px',marginBottom:'8px'}}>🔐</div>
          <h2 style={{margin:0,fontSize:'20px',fontWeight:'800',color:'#1f2937'}}>Acesso Restrito</h2>
          <p style={{color:'#6b7280',fontSize:'14px',marginTop:'8px'}}>Gerenciamento de motoristas e veículos — somente administrador</p>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>
          <input type="password" value={senhaInput} onChange={e=>setSenhaInput(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&handleSenha()}
            placeholder="Senha do administrador"
            style={{padding:'12px',border:'1.5px solid #d1d5db',borderRadius:'8px',fontSize:'16px'}} />
          {senhaError && <div style={{color:'#dc2626',fontSize:'13px'}}>{senhaError}</div>}
          <button onClick={handleSenha} style={{background:'#1e3a5f',color:'white',border:'none',borderRadius:'8px',padding:'12px',fontSize:'15px',fontWeight:'700',cursor:'pointer'}}>
            Acessar
          </button>
        </div>
      </div>
    );
  }

  const cardStyle = {background:'white',borderRadius:'14px',padding:'20px',boxShadow:'0 1px 6px rgba(0,0,0,0.08)',marginBottom:'20px'};
  const tagStyle = (color) => ({display:'inline-flex',alignItems:'center',gap:'6px',padding:'6px 12px',borderRadius:'20px',
    background: color==='blue'?'#eff6ff':'#f0fdf4', color: color==='blue'?'#1d4ed8':'#166534',
    border:`1px solid ${color==='blue'?'#bfdbfe':'#86efac'}`, fontSize:'13px',fontWeight:'600',margin:'4px'});
  const inputStyle = {flex:1,padding:'9px 12px',border:'1.5px solid #d1d5db',borderRadius:'8px',fontSize:'14px'};
  const btnAddStyle = {background:'#1e3a5f',color:'white',border:'none',borderRadius:'8px',padding:'9px 16px',fontSize:'13px',fontWeight:'700',cursor:'pointer',whiteSpace:'nowrap'};
  const btnRemStyle = {background:'none',border:'none',cursor:'pointer',color:'#9ca3af',fontSize:'16px',lineHeight:1,padding:'0 2px'};

  return (
    <div style={{maxWidth:'680px',margin:'0 auto',padding:'16px'}}>
      {saved && (
        <div style={{background:'#f0fdf4',border:'1.5px solid #86efac',borderRadius:'10px',padding:'14px',marginBottom:'16px',color:'#166534',fontWeight:'700',textAlign:'center'}}>
          ✅ Salvo! Recarregando o sistema...
        </div>
      )}

      {/* Veículos */}
      <div style={cardStyle}>
        <div style={{fontWeight:'800',fontSize:'16px',color:'#1f2937',marginBottom:'14px'}}>🚗 Veículos (VTR)</div>
        <div style={{marginBottom:'12px',minHeight:'36px'}}>
          {carros.map(c => (
            <span key={c.placa} style={tagStyle('blue')}>
              {c.nome} · <span style={{fontSize:'12px',opacity:0.8}}>{c.placa}</span>
              <button style={btnRemStyle} onClick={() => removeCarro(c.placa)} title="Remover">✕</button>
            </span>
          ))}
        </div>
        <div style={{display:'flex',gap:'8px',flexWrap:'wrap'}}>
          <input value={novoModelo} onChange={e=>setNovoModelo(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&addCarro()}
            placeholder="Modelo (ex: Mobi)"
            style={inputStyle} />
          <input value={novaPlaca} onChange={e=>setNovaPlaca(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&addCarro()}
            placeholder="Placa (ex: ABC1D23)"
            style={{...inputStyle, width:'140px', flex:'none'}} />
          <button onClick={addCarro} style={btnAddStyle}>+ Adicionar</button>
        </div>
        <div style={{fontSize:'12px',color:'#9ca3af',marginTop:'8px'}}>Informe placa e modelo. Para remover, clique no ✕.</div>
      </div>

      {/* Motoristas */}
      <div style={cardStyle}>
        <div style={{fontWeight:'800',fontSize:'16px',color:'#1f2937',marginBottom:'14px'}}>👤 Motoristas</div>
        <div style={{marginBottom:'12px',minHeight:'36px'}}>
          {motoristas.map(m => (
            <span key={m.nome} style={tagStyle('green')}>
              {m.nome}{m.cpf ? <span style={{fontSize:'11px',opacity:0.7}}> · {m.cpf}</span> : ''}
              <button style={btnRemStyle} onClick={() => removeMotorista(m.nome)} title="Remover">✕</button>
            </span>
          ))}
        </div>
        <div style={{display:'flex',gap:'8px',flexWrap:'wrap'}}>
          <input value={novoNome} onChange={e=>setNovoNome(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&addMotorista()}
            placeholder="Nome completo (ex: CARLOS SOUZA)"
            style={inputStyle} />
          <input value={novoCpf} onChange={e=>setNovoCpf(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&addMotorista()}
            placeholder="CPF (11 dígitos)"
            type="tel" maxLength={14}
            style={{...inputStyle, width:'160px', flex:'none'}} />
          <button onClick={addMotorista} style={btnAddStyle}>+ Adicionar</button>
        </div>
        <div style={{fontSize:'12px',color:'#9ca3af',marginTop:'8px'}}>
          Informe nome e CPF. O CPF é usado para autenticação na tela do motorista. Para remover, clique no ✕.
        </div>
      </div>

      <button onClick={handleSave} disabled={saved}
        style={{width:'100%',background:'#16a34a',color:'white',border:'none',borderRadius:'10px',padding:'14px',fontSize:'16px',fontWeight:'800',cursor:'pointer'}}>
        💾 Salvar Alterações
      </button>
    </div>
  );
}

// ─── CADASTRO MANUAL PAGE ─────────────────────────────────────────────────────
function CadastroManualPage({ scriptUrl }) {
  const [authenticated, setAuthenticated] = React.useState(false);
  const [senhaInput, setSenhaInput] = React.useState('');
  const [senhaError, setSenhaError] = React.useState('');
  const NIVEIS = ['vazio','reserva','1/4','meio','3/4','cheio'];
  const emptyForm = () => ({
    vtr:'', motorista:'', data:'', km_inicial:'', km_final:'',
    nivel_inicio:'', nivel_fim:'', abasteceu:'NAO',
    tipo_combustivel:'gasolina',
    posto:'', km_abst:'', valor_abast:'', litros:''
  });
  const [form, setForm] = React.useState(emptyForm());
  const [rotas, setRotas] = React.useState([{hora:'', destino:'', km:''}]);
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState('');
  const [success, setSuccess] = React.useState('');

  const handleSenha = () => {
    if (senhaInput === '2311') { setAuthenticated(true); }
    else { setSenhaError('Senha incorreta'); }
  };

  const addRota = () => setRotas(r => [...r, {hora:'', destino:'', km:''}]);
  const removeRota = i => setRotas(r => r.filter((_,idx) => idx !== i));
  const updateRota = (i, field, val) => setRotas(r => r.map((row,idx) => idx===i ? {...row,[field]:val} : row));

  const handleSubmit = async () => {
    setError(''); setSuccess('');
    if (!form.vtr)         { setError('Selecione o veículo'); return; }
    if (!form.motorista)   { setError('Selecione o motorista'); return; }
    if (!form.data)        { setError('Informe a data'); return; }
    if (!form.km_inicial)  { setError('Informe o KM inicial'); return; }
    if (!form.km_final)    { setError('Informe o KM final'); return; }
    const ki = parseInt(form.km_inicial), kf = parseInt(form.km_final);
    if (kf <= ki)          { setError('KM final deve ser maior que KM inicial'); return; }
    if (!form.nivel_inicio){ setError('Selecione o nível de combustível no início'); return; }
    if (!form.nivel_fim)   { setError('Selecione o nível de combustível no fim'); return; }
    const [dia, mes, ano] = form.data.split('/');
    const mesesNomes = ['','janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
    const nomeMes = mesesNomes[parseInt(mes)] || '';
    const rotasValidas = rotas.filter(r => r.destino && r.destino.trim());
    setLoading(true);
    try {
      const res = await fetch(scriptUrl, {
        method:'POST', headers:{'Content-Type':'text/plain'},
        body: JSON.stringify({
          action:'add',
          data:{
            vtr: form.vtr, motorista: form.motorista, data: form.data,
            km_inicial: ki, km_final: kf, km_dia: kf - ki,
            nivel_inicio: form.nivel_inicio, nivel_fim: form.nivel_fim,
            abasteceu: form.abasteceu,
            tipo_combustivel: form.abasteceu === 'SIM' ? (form.tipo_combustivel || 'gasolina') : '',
            posto: form.posto || '', km_abst: form.km_abst || '',
            valor_abast: form.valor_abast || '', litros: form.litros || '',
            mes: nomeMes, rotas: rotasValidas
          }
        })
      });
      const json = await res.json();
      if (!json.success) throw new Error(json.error || 'Erro ao salvar');
      setSuccess('Registro cadastrado com sucesso!');
      setForm(emptyForm());
      setRotas([{hora:'', destino:'', km:''}]);
    } catch(e) { setError('Erro: ' + e.message); }
    setLoading(false);
  };

  if (!authenticated) {
    return (
      <div style={{maxWidth:'380px',margin:'48px auto',padding:'28px',background:'white',borderRadius:'16px',boxShadow:'0 2px 12px rgba(0,0,0,0.1)'}}>
        <div style={{textAlign:'center',marginBottom:'24px'}}>
          <div style={{fontSize:'40px',marginBottom:'8px'}}>🔐</div>
          <h2 style={{margin:0,fontSize:'20px',fontWeight:'800',color:'#1f2937'}}>Acesso Restrito</h2>
          <p style={{color:'#6b7280',fontSize:'14px',marginTop:'8px'}}>Cadastro manual de registros — somente administrador</p>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>
          <input type="password" value={senhaInput} onChange={e=>setSenhaInput(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&handleSenha()}
            placeholder="Senha do administrador"
            style={{padding:'12px',border:'1.5px solid #d1d5db',borderRadius:'8px',fontSize:'16px'}} />
          {senhaError && <div style={{color:'#dc2626',fontSize:'13px'}}>{senhaError}</div>}
          <button onClick={handleSenha} style={{background:'#1e3a5f',color:'white',border:'none',borderRadius:'8px',padding:'12px',fontSize:'15px',fontWeight:'700',cursor:'pointer'}}>
            Acessar
          </button>
        </div>
      </div>
    );
  }

  const inputStyle = {width:'100%',padding:'10px 12px',border:'1.5px solid #d1d5db',borderRadius:'8px',fontSize:'14px',boxSizing:'border-box'};
  const labelStyle = {display:'block',fontSize:'12px',fontWeight:'700',color:'#374151',marginBottom:'4px'};
  const groupStyle = {display:'flex',flexDirection:'column',gap:'4px'};

  return (
    <div style={{maxWidth:'640px',margin:'0 auto',padding:'16px'}}>
      <h2 style={{margin:'0 0 20px',fontSize:'18px',fontWeight:'800',color:'#1f2937'}}>📋 Cadastro Manual de Registro</h2>

      {error   && <div style={{background:'#fef2f2',border:'1.5px solid #fca5a5',borderRadius:'8px',padding:'12px',marginBottom:'16px',color:'#dc2626',fontWeight:'600'}}>{error}</div>}
      {success && <div style={{background:'#f0fdf4',border:'1.5px solid #86efac',borderRadius:'8px',padding:'12px',marginBottom:'16px',color:'#166534',fontWeight:'600'}}>{success}</div>}

      {/* Identificação */}
      <div style={{background:'white',borderRadius:'12px',padding:'16px',marginBottom:'12px',boxShadow:'0 1px 4px rgba(0,0,0,0.06)'}}>
        <div style={{fontSize:'13px',fontWeight:'800',color:'#6b7280',marginBottom:'12px',textTransform:'uppercase',letterSpacing:'0.05em'}}>Identificação</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}}>
          <div style={groupStyle}>
            <label style={labelStyle}>Veículo (VTR)</label>
            <select value={form.vtr} onChange={e=>setForm(f=>({...f,vtr:e.target.value}))} style={inputStyle}>
              <option value="">Selecione</option>
              {CARROS.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
          </div>
          <div style={groupStyle}>
            <label style={labelStyle}>Motorista</label>
            <select value={form.motorista} onChange={e=>setForm(f=>({...f,motorista:e.target.value}))} style={inputStyle}>
              <option value="">Selecione</option>
              {MOTORISTAS.map(m=><option key={m} value={m}>{m}</option>)}
            </select>
          </div>
        </div>
        <div style={{marginTop:'12px'}}>
          <label style={labelStyle}>Data</label>
          <input type="text" value={form.data} onChange={e=>setForm(f=>({...f,data:e.target.value}))}
            placeholder="DD/MM/AAAA" style={inputStyle} />
        </div>
      </div>

      {/* KM */}
      <div style={{background:'white',borderRadius:'12px',padding:'16px',marginBottom:'12px',boxShadow:'0 1px 4px rgba(0,0,0,0.06)'}}>
        <div style={{fontSize:'13px',fontWeight:'800',color:'#6b7280',marginBottom:'12px',textTransform:'uppercase',letterSpacing:'0.05em'}}>Quilometragem</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'12px'}}>
          <div style={groupStyle}>
            <label style={labelStyle}>KM Inicial</label>
            <input type="number" value={form.km_inicial} onChange={e=>setForm(f=>({...f,km_inicial:e.target.value}))} placeholder="Ex: 15000" style={inputStyle} />
          </div>
          <div style={groupStyle}>
            <label style={labelStyle}>KM Final</label>
            <input type="number" value={form.km_final} onChange={e=>setForm(f=>({...f,km_final:e.target.value}))} placeholder="Ex: 15200" style={inputStyle} />
          </div>
          <div style={groupStyle}>
            <label style={labelStyle}>KM Rodados</label>
            <div style={{padding:'10px 12px',background:'#f0fdf4',border:'1.5px solid #bbf7d0',borderRadius:'8px',fontSize:'14px',fontWeight:'800',color:'#059669',textAlign:'center'}}>
              {form.km_inicial && form.km_final && parseInt(form.km_final)>parseInt(form.km_inicial)
                ? (parseInt(form.km_final)-parseInt(form.km_inicial)).toLocaleString('pt-BR') + ' km'
                : '—'}
            </div>
          </div>
        </div>
      </div>

      {/* Combustível */}
      <div style={{background:'white',borderRadius:'12px',padding:'16px',marginBottom:'12px',boxShadow:'0 1px 4px rgba(0,0,0,0.06)'}}>
        <div style={{fontSize:'13px',fontWeight:'800',color:'#6b7280',marginBottom:'12px',textTransform:'uppercase',letterSpacing:'0.05em'}}>Combustível</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px',marginBottom:'12px'}}>
          <div style={groupStyle}>
            <label style={labelStyle}>Nível Início</label>
            <select value={form.nivel_inicio} onChange={e=>setForm(f=>({...f,nivel_inicio:e.target.value}))} style={inputStyle}>
              <option value="">Selecione</option>
              {NIVEIS.map(n=><option key={n} value={n}>{n}</option>)}
            </select>
          </div>
          <div style={groupStyle}>
            <label style={labelStyle}>Nível Fim</label>
            <select value={form.nivel_fim} onChange={e=>setForm(f=>({...f,nivel_fim:e.target.value}))} style={inputStyle}>
              <option value="">Selecione</option>
              {NIVEIS.map(n=><option key={n} value={n}>{n}</option>)}
            </select>
          </div>
        </div>
        <div style={groupStyle}>
          <label style={labelStyle}>Abasteceu?</label>
          <div style={{display:'flex',gap:'8px'}}>
            {['NAO','SIM'].map(v=>(
              <button key={v} onClick={()=>setForm(f=>({...f,abasteceu:v}))}
                style={{flex:1,padding:'10px',border:'1.5px solid '+(form.abasteceu===v?'#1e3a5f':'#d1d5db'),
                  borderRadius:'8px',background:form.abasteceu===v?'#1e3a5f':'white',
                  color:form.abasteceu===v?'white':'#374151',fontWeight:'700',cursor:'pointer',fontSize:'14px'}}>
                {v === 'SIM' ? '✅ Sim' : '❌ Não'}
              </button>
            ))}
          </div>
        </div>
        {form.abasteceu === 'SIM' && (
          <div style={{marginTop:'12px'}}>
            <div style={groupStyle}>
              <label style={labelStyle}>Tipo de Combustível</label>
              <div style={{display:'flex',gap:'8px'}}>
                {[{val:'gasolina',label:'⛽ Gasolina',activeColor:'#dc2626'},{val:'alcool',label:'🌿 Álcool',activeColor:'#16a34a'}].map(opt=>(
                  <button key={opt.val} onClick={()=>setForm(f=>({...f,tipo_combustivel:opt.val}))}
                    style={{flex:1,padding:'9px',borderRadius:'8px',fontWeight:'700',fontSize:'13px',cursor:'pointer',
                      border:`1.5px solid ${form.tipo_combustivel===opt.val ? opt.activeColor : '#d1d5db'}`,
                      background: form.tipo_combustivel===opt.val ? opt.activeColor : 'white',
                      color: form.tipo_combustivel===opt.val ? 'white' : '#374151'}}>
                    {opt.label}
                  </button>
                ))}
              </div>
            </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px',marginTop:'8px'}}>
            <div style={groupStyle}>
              <label style={labelStyle}>Posto</label>
              <input type="text" value={form.posto} onChange={e=>setForm(f=>({...f,posto:e.target.value}))} placeholder="Nome do posto" style={inputStyle} />
            </div>
            <div style={groupStyle}>
              <label style={labelStyle}>KM no Abastecimento</label>
              <input type="number" value={form.km_abst} onChange={e=>setForm(f=>({...f,km_abst:e.target.value}))} placeholder="Ex: 15100" style={inputStyle} />
            </div>
            <div style={groupStyle}>
              <label style={labelStyle}>Valor (R$)</label>
              <input type="number" step="0.01" value={form.valor_abast} onChange={e=>setForm(f=>({...f,valor_abast:e.target.value}))} placeholder="Ex: 150.00" style={inputStyle} />
            </div>
            <div style={groupStyle}>
              <label style={labelStyle}>Litros</label>
              <input type="number" step="0.01" value={form.litros} onChange={e=>setForm(f=>({...f,litros:e.target.value}))} placeholder="Ex: 30.5" style={inputStyle} />
            </div>
          </div>
          </div>
        )}
      </div>

      {/* Rotas */}
      <div style={{background:'white',borderRadius:'12px',padding:'16px',marginBottom:'16px',boxShadow:'0 1px 4px rgba(0,0,0,0.06)'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}}>
          <div style={{fontSize:'13px',fontWeight:'800',color:'#6b7280',textTransform:'uppercase',letterSpacing:'0.05em'}}>Rotas / Paradas <span style={{color:'#9ca3af',fontWeight:'400',fontSize:'11px'}}>(opcional)</span></div>
          <button onClick={addRota} style={{background:'#eff6ff',color:'#1d4ed8',border:'1px solid #bfdbfe',borderRadius:'6px',padding:'5px 12px',fontSize:'12px',fontWeight:'700',cursor:'pointer'}}>
            + Adicionar
          </button>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'90px 1fr 100px 32px',gap:'6px',marginBottom:'6px'}}>
          {['Horário','Destino','Hodôm.',''].map((h,i)=>(
            <div key={i} style={{fontSize:'11px',fontWeight:'700',color:'#6b7280',paddingLeft:'2px'}}>{h}</div>
          ))}
        </div>
        {rotas.map((r,i)=>(
          <div key={i} style={{display:'grid',gridTemplateColumns:'90px 1fr 100px 32px',gap:'6px',marginBottom:'6px'}}>
            <input type="text" value={r.hora} onChange={e=>updateRota(i,'hora',e.target.value)} placeholder="HH:MM" style={{...inputStyle,padding:'8px'}} />
            <input type="text" value={r.destino} onChange={e=>updateRota(i,'destino',e.target.value)} placeholder="Local/destino" style={{...inputStyle,padding:'8px'}} />
            <input type="number" value={r.km} onChange={e=>updateRota(i,'km',e.target.value)} placeholder="KM" style={{...inputStyle,padding:'8px'}} />
            <button onClick={()=>removeRota(i)} style={{background:'#fef2f2',color:'#ef4444',border:'1px solid #fecaca',borderRadius:'6px',cursor:'pointer',fontSize:'16px',fontWeight:'700'}}>×</button>
          </div>
        ))}
      </div>

      <button onClick={handleSubmit} disabled={loading}
        style={{width:'100%',background:'#1e3a5f',color:'white',border:'none',borderRadius:'12px',padding:'14px',fontSize:'16px',fontWeight:'800',cursor:'pointer',opacity:loading?0.7:1}}>
        {loading ? '⏳ Salvando...' : '💾 Salvar Registro'}
      </button>
    </div>
  );
}

function RotasAbertasPage({ scriptUrl }) {
  const [authenticated, setAuthenticated] = React.useState(false);
  const [senhaInput, setSenhaInput] = React.useState('');
  const [senhaError, setSenhaError] = React.useState('');
  const [sessoes, setSessoes] = React.useState([]);
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState('');
  const [finalizandoId, setFinalizandoId] = React.useState(null);
