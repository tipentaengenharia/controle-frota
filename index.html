  const [successMsg, setSuccessMsg] = React.useState('');

  const handleSenha = () => {
    if (senhaInput === '2311') {
      setAuthenticated(true);
      loadSessoes();
    } else {
      setSenhaError('Senha incorreta');
    }
  };

  const loadSessoes = async () => {
    setLoading(true); setError('');
    try {
      const res = await fetch(scriptUrl + '?action=getSessoesAbertas');
      const json = await res.json();
      if (!json.success) throw new Error(json.error || 'Erro');
      setSessoes(json.data);
    } catch(e) { setError('Erro ao carregar: ' + e.message); }
    setLoading(false);
  };

  const handleForcarFinalizacao = async (sessaoId, motorista, vtr) => {
    if (!window.confirm(`Forçar finalização da rota de ${motorista} no veículo ${vtr}?`)) return;
    setFinalizandoId(sessaoId); setSuccessMsg(''); setError('');
    try {
      const res = await fetch(scriptUrl, {
        method: 'POST',
        headers: {'Content-Type': 'text/plain'},
        body: JSON.stringify({action:'adminFinalizarSessao', data:{sessaoId, senha:'2311'}})
      });
      const data = await res.json();
      if (!data.success) throw new Error(data.error);
      setSuccessMsg(`Rota de ${motorista} finalizada com sucesso.`);
      loadSessoes();
    } catch(e) { setError('Erro: ' + e.message); }
    setFinalizandoId(null);
  };

  if (!authenticated) {
    return (
      <div style={{maxWidth:'400px',margin:'40px auto',padding:'24px',background:'white',borderRadius:'16px',boxShadow:'0 2px 12px rgba(0,0,0,0.1)'}}>
        <div style={{textAlign:'center',marginBottom:'24px'}}>
          <div style={{fontSize:'40px',marginBottom:'8px'}}>🔐</div>
          <h2 style={{margin:0,fontSize:'20px',fontWeight:'800',color:'#1f2937'}}>Área Administrativa</h2>
          <p style={{color:'#6b7280',fontSize:'14px',marginTop:'8px'}}>Digite a senha para acessar as rotas em aberto</p>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>
          <input type="password" value={senhaInput} onChange={e=>setSenhaInput(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&handleSenha()}
            placeholder="Senha" style={{padding:'12px',border:'1.5px solid #d1d5db',borderRadius:'8px',fontSize:'16px'}} />
          {senhaError && <div style={{color:'#dc2626',fontSize:'13px'}}>{senhaError}</div>}
          <button onClick={handleSenha} style={{background:'#1e3a5f',color:'white',border:'none',borderRadius:'8px',padding:'12px',fontSize:'15px',fontWeight:'700',cursor:'pointer'}}>
            Acessar
          </button>
        </div>
      </div>
    );
  }

  return (
    <div style={{padding:'16px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'20px'}}>
        <h2 style={{margin:0,fontSize:'18px',fontWeight:'800',color:'#1f2937'}}>Rotas em Aberto</h2>
        <button onClick={loadSessoes} style={{background:'#f3f4f6',border:'none',borderRadius:'8px',padding:'8px 14px',cursor:'pointer',fontSize:'13px',fontWeight:'600'}}>
          🔄 Atualizar
        </button>
      </div>

      {successMsg && <div style={{background:'#f0fdf4',border:'1.5px solid #86efac',borderRadius:'8px',padding:'12px',marginBottom:'16px',color:'#166534',fontWeight:'600'}}>{successMsg}</div>}
      {error && <div style={{background:'#fef2f2',border:'1.5px solid #fca5a5',borderRadius:'8px',padding:'12px',marginBottom:'16px',color:'#dc2626'}}>{error}</div>}

      {loading ? (
        <div style={{textAlign:'center',padding:'40px',color:'#6b7280'}}>Carregando...</div>
      ) : sessoes.length === 0 ? (
        <div style={{textAlign:'center',padding:'40px',color:'#6b7280'}}>
          <div style={{fontSize:'40px',marginBottom:'12px'}}>✅</div>
          <div style={{fontWeight:'600'}}>Nenhuma rota em aberto</div>
        </div>
      ) : (
        <div style={{display:'flex',flexDirection:'column',gap:'12px'}}>
          {sessoes.map(s => (
            <div key={s.id} style={{background:'white',borderRadius:'12px',padding:'16px',boxShadow:'0 1px 6px rgba(0,0,0,0.08)',border:'1.5px solid #fde68a'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'10px'}}>
                <div>
                  <div style={{fontWeight:'800',fontSize:'16px',color:'#1f2937'}}>{s.vtr}</div>
                  <div style={{color:'#4b5563',fontSize:'13px',marginTop:'2px'}}>👤 {s.motorista}</div>
                  <div style={{color:'#6b7280',fontSize:'12px',marginTop:'2px'}}>📅 {s.data} · 🕐 Iniciou às {s.horaInicio}</div>
                </div>
                <span style={{background:'#fef3c7',color:'#92400e',fontSize:'11px',fontWeight:'700',padding:'4px 10px',borderRadius:'20px',border:'1px solid #fde68a'}}>
                  EM ABERTO
                </span>
              </div>

              {s.dados && (
                <div style={{background:'#f9fafb',borderRadius:'8px',padding:'10px',marginBottom:'12px',fontSize:'12px',color:'#4b5563'}}>
                  <div>🔑 KM Inicial: <strong>{s.dados.km_inicial || '—'}</strong></div>
                  <div style={{marginTop:'4px'}}>🗺️ Rotas registradas: <strong>{(s.dados.rotas||[]).filter(r=>r.destino).length}</strong></div>
                  {(s.dados.rotas||[]).filter(r=>r.destino).map((r,i) => (
                    <div key={i} style={{marginTop:'2px',paddingLeft:'12px'}}>• {r.hora||'--:--'} {r.destino} {r.km?'('+r.km+' km)':''}</div>
                  ))}
                </div>
              )}

              <button
                onClick={() => handleForcarFinalizacao(s.id, s.motorista, s.vtr)}
                disabled={finalizandoId === s.id}
                style={{width:'100%',background:'#dc2626',color:'white',border:'none',borderRadius:'8px',padding:'10px',fontSize:'14px',fontWeight:'700',cursor:'pointer'}}>
                {finalizandoId === s.id ? 'Finalizando...' : '⚡ Forçar Finalização'}
              </button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── ROTAS PAGE ───────────────────────────────────────────────────────────────
function RotasPage({ scriptUrl }) {
  const [filterVtr,       setFilterVtr]       = useState('');
  const [filterData,      setFilterData]      = useState('');
  const [filterMotorista, setFilterMotorista] = useState('');
  const [rotas,           setRotas]           = useState([]);
  const [loading,         setLoading]         = useState(false);
  const [error,           setError]           = useState('');
  const [searched,        setSearched]        = useState(false);

  const handleSearch = async () => {
    setLoading(true); setError(''); setSearched(true);
    try {
      let url = scriptUrl + '?action=getRotas';
      if (filterVtr)       url += '&vtr='       + encodeURIComponent(filterVtr);
      if (filterData)      url += '&data='      + encodeURIComponent(filterData.split('-').reverse().join('/'));
      if (filterMotorista) url += '&motorista=' + encodeURIComponent(filterMotorista);
      const data = await apiGet(url);
      const sorted = [...data].sort((a,b) => {
        const d = (b.data||'').localeCompare(a.data||'');
        if (d !== 0) return d;
        return (a.hora||'').localeCompare(b.hora||'');
      });
      setRotas(sorted);
    } catch(e) { setError('Erro ao consultar: ' + e.message); }
    setLoading(false);
  };

  const fmtDate = d => {
    if (!d) return '—';
    // Server returns dd/MM/yyyy — display as-is
    return d;
  };

  return (
    <div>
      <div className="section-title">🗺️ Consulta de Rotas</div>

      {/* Filters */}
      <div className="summary-table-wrap" style={{marginBottom:20}}>
        <div style={{padding:'16px 20px',display:'flex',flexWrap:'wrap',gap:'12px',alignItems:'flex-end'}}>
          <div className="filter-group">
            <span className="filter-label">VTR:</span>
            <select value={filterVtr} onChange={e=>setFilterVtr(e.target.value)}>
              <option value="">Todas</option>
              {CARROS.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
          </div>
          <div className="filter-group">
            <span className="filter-label">Data:</span>
            <input type="date" value={filterData} onChange={e=>setFilterData(e.target.value)}
              style={{border:'1.5px solid #e2e8f0',borderRadius:'8px',padding:'7px 10px',fontSize:'13px',color:'#1a1a2e',background:'#fff'}}/>
          </div>
          <div className="filter-group">
            <span className="filter-label">Motorista:</span>
            <select value={filterMotorista} onChange={e=>setFilterMotorista(e.target.value)}>
              <option value="">Todos</option>
              {MOTORISTAS.map(m=><option key={m} value={m}>{m}</option>)}
            </select>
          </div>
          <button className="btn btn-primary" onClick={handleSearch} disabled={loading}
            style={{padding:'8px 20px',fontSize:'13px',fontWeight:'700',borderRadius:'8px',border:'none',background:'#29ABE2',color:'#fff',cursor:'pointer'}}>
            {loading ? '⏳ Consultando...' : '🔍 Consultar'}
          </button>
        </div>
      </div>

      {error && <div style={{color:'#dc2626',padding:'12px 16px',background:'#fee2e2',borderRadius:'8px',marginBottom:16}}>{error}</div>}

      {searched && !loading && (
        rotas.length === 0
          ? <div style={{textAlign:'center',padding:'40px',color:'#94a3b8',fontSize:'15px'}}>Nenhuma rota encontrada para os filtros selecionados.</div>
          : (
            <div className="summary-table-wrap">
              <div className="summary-header">
                <h3>Resultados — {rotas.length} registro(s)</h3>
              </div>
              <div style={{overflowX:'auto'}}>
                <table>
                  <thead>
                    <tr>
                      <th>Data</th>
                      <th>Horário</th>
                      <th>VTR</th>
                      <th>Motorista</th>
                      <th>Destino</th>
                      <th>KM Hodômetro</th>
                      <th>Localização</th>
                    </tr>
                  </thead>
                  <tbody>
                    {rotas.map((r,i) => (
                      <tr key={i}>
                        <td style={{fontWeight:600}}>{fmtDate(r.data)}</td>
                        <td style={{fontWeight:700,color:'#29ABE2',whiteSpace:'nowrap'}}>{r.hora||'—'}</td>
                        <td>
                          <span className={`vtr-badge ${VTR_COLOR[r.vtr]||'vtr-c0'}`}>{r.vtr}</span>
                        </td>
                        <td style={{fontSize:'12px'}}>{r.motorista}</td>
                        <td>{r.destino||'—'}</td>
                        <td style={{fontWeight:700,textAlign:'right'}}>{r.km_rota ? Number(r.km_rota).toLocaleString('pt-BR') : '—'}</td>
                        <td style={{textAlign:'center'}}>
                          {r.lat && r.lng
                            ? <a href={`https://maps.google.com/?q=${r.lat},${r.lng}`} target="_blank" rel="noopener noreferrer" title="Ver no Google Maps" style={{fontSize:'18px',textDecoration:'none'}}>📍</a>
                            : '—'}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )
      )}
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [scriptUrl, setScriptUrl] = useState(() => {
    try { return sessionStorage.getItem(SCRIPT_URL_KEY) || 'https://script.google.com/macros/s/AKfycbyUQg2vWTIXmP-IR20ra_qmhfPjL1POOBdQkCepuIZiezDeKIFafYMMR6ZFGWoiRTLshA/exec'; } catch { return ''; }
  });
  const [page, setPage] = useState('dashboard');
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [records, setRecords] = useState([]);
  const [loading, setLoading] = useState(false);
  const [syncStatus, setSyncStatus] = useState('idle'); // idle | loading | ok | error
  const [toast, setToast] = useState(null);

  const showToast = (msg, type = 'success') => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3500);
  };

  const loadRecords = useCallback(async () => {
    if (!scriptUrl) return;
    setSyncStatus('loading');
    try {
      const data = await apiGet(scriptUrl);
      setRecords(data);
      setSyncStatus('ok');
    } catch(e) {
      setSyncStatus('error');
      showToast('❌ Erro ao carregar dados: ' + e.message, 'error');
    }
  }, [scriptUrl]);

  useEffect(() => { if (scriptUrl) loadRecords(); }, [scriptUrl]);

  useEffect(() => {
    if (!scriptUrl) return;
    if (sessionStorage.getItem('cfg_synced') === '1') { sessionStorage.removeItem('cfg_synced'); return; }
    fetch(scriptUrl + '?action=getConfig')
      .then(r => r.json())
      .then(d => {
        let changed = false;
        if (d.veiculos && d.veiculos.length && JSON.stringify(d.veiculos) !== localStorage.getItem('penta_carros')) {
          localStorage.setItem('penta_carros', JSON.stringify(d.veiculos));
          changed = true;
        }
        if (d.motoristas && d.motoristas.length && JSON.stringify(d.motoristas) !== localStorage.getItem('penta_motoristas')) {
          localStorage.setItem('penta_motoristas', JSON.stringify(d.motoristas));
          changed = true;
        }
        if (changed) { sessionStorage.setItem('cfg_synced', '1'); window.location.reload(); }
      })
      .catch(() => {});
  }, [scriptUrl]);

  const handleSetupSave = (url) => {
    try { sessionStorage.setItem(SCRIPT_URL_KEY, url); } catch {}
    setScriptUrl(url);
  };

  const handleDisconnect = () => {
    try { sessionStorage.removeItem(SCRIPT_URL_KEY); } catch {}
    setScriptUrl('');
    setRecords([]);
    setSyncStatus('idle');
  };

  if (!scriptUrl) return <SetupScreen onSave={handleSetupSave} />;

  return (
    <div className="layout">
      <div className={`sidebar-overlay ${sidebarOpen?'visible':''}`} onClick={() => setSidebarOpen(false)} />
      <aside className={`sidebar ${sidebarOpen?'open':''}`}>
        <div className="sidebar-logo" style={{padding:'16px 16px 14px',textAlign:'center',position:'relative'}}>
          <button className="sidebar-close" onClick={() => setSidebarOpen(false)}>✕</button>

          <div className={`nav-item ${page==='relatorio'?'active':''}`} onClick={() => { setPage('relatorio'); setSidebarOpen(false); }}>
            📅 Relatório de Período
          </div>
          <div className={`nav-item ${page==='rotas'?'active':''}`} onClick={() => { setPage('rotas'); setSidebarOpen(false); }}>
            🗺️ Consulta de Rotas
          </div>
          <div className={`nav-item ${page==='rotasAbertas'?'active':''}`} onClick={() => { setPage('rotasAbertas'); setSidebarOpen(false); }}>
            🔓 Rotas em Aberto
          </div>
          <div className={`nav-item ${page==='cadastroManual'?'active':''}`} onClick={() => { setPage('cadastroManual'); setSidebarOpen(false); }}>
            📝 Cadastro Manual
          </div>
          <div className={`nav-item ${page==='cadastros'?'active':''}`} onClick={() => { setPage('cadastros'); setSidebarOpen(false); }}>
            ⚙️ Motoristas e Carros
          </div>
          <div className="nav-section" style={{marginTop:24}}>Veículos</div>
          {VEICULOS_LIST.map(v => (
            <div key={v.placa} className="nav-item" style={{fontSize:'12.5px'}} onClick={() => { setPage('records'); setSidebarOpen(false); }}>
              🚗 {v.nome} ({v.placa})
            </div>
          ))}
        </nav>
        <div style={{padding:'12px 16px', borderTop:'1px solid rgba(255,255,255,0.08)'}}>
          <button className="btn btn-secondary btn-sm" style={{width:'100%', fontSize:'11px'}} onClick={handleDisconnect}>
            🔌 Trocar planilha
          </button>
        </div>
        <div style={{padding:'8px 20px 16px', fontSize:'11px', color:'rgba(255,255,255,0.3)'}}>
          {records.length} registros
        </div>
      </aside>

      <div className="main">
        <div className="topbar">
          <button className="hamburger" onClick={() => setSidebarOpen(o => !o)}>
            <span/><span/><span/>
          </button>
          <h2>{page === 'dashboard' ? 'Dashboard' : page === 'records' ? 'Registros de Uso' : page === 'relatorio' ? 'Relatório por Período' : page === 'rotasAbertas' ? 'Rotas em Aberto' : page === 'cadastroManual' ? 'Cadastro Manual' : page === 'cadastros' ? 'Motoristas e Carros' : 'Consulta de Rotas'}</h2>
          <div className="topbar-right">
            <div className="sync-status">
              <div className={`sync-dot ${syncStatus === 'loading' ? 'loading' : syncStatus === 'error' ? 'error' : ''}`} />
              {syncStatus === 'loading' ? 'Sincronizando...' : syncStatus === 'error' ? 'Erro de conexão' : 'Google Sheets'}
            </div>
            <span className="topbar-badge">2026</span>
          </div>
        </div>
        <div className="content">
          {records.length === 0 && syncStatus === 'loading' && (
            <div style={{textAlign:'center',padding:'80px 20px',color:'#94a3b8'}}>
              <div style={{fontSize:'48px',marginBottom:'16px'}}>⏳</div>
              <p style={{fontSize:'16px'}}>Carregando dados da planilha...</p>
            </div>
          )}
          {(records.length > 0 || syncStatus === 'ok') && page === 'dashboard' && <Dashboard records={records} />}
          {(records.length > 0 || syncStatus === 'ok') && page === 'records' && (
            <RecordsTable records={records} scriptUrl={scriptUrl} onRefresh={loadRecords} showToast={showToast} />
          )}
          {(records.length > 0 || syncStatus === 'ok') && page === 'relatorio' && (
            <RelatorioPage records={records} />
          )}
          {page === 'rotas' && (
            <RotasPage scriptUrl={scriptUrl} />
          )}
          {page === 'rotasAbertas' && <RotasAbertasPage scriptUrl={scriptUrl} />}
          {page === 'cadastroManual' && <CadastroManualPage scriptUrl={scriptUrl} />}
          {page === 'cadastros' && <CadastroMotoristasCarrosPage scriptUrl={scriptUrl} />}
        </div>
      </div>

      {toast && <div className={`toast`}>{toast.msg}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
